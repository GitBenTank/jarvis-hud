<svg width="1100" height="320" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Arial, sans-serif">

  <style>
    .title { font-size: 20px; font-weight: bold; fill: #222; }
    .section { font-size: 14px; fill: #555; }
    .box { fill: #f7f7f7; stroke: #444; stroke-width: 1.5; rx: 8; }
    .text { font-size: 14px; fill: #222; text-anchor: middle; dominant-baseline: middle; }
    .arrow { stroke: #333; stroke-width: 2; marker-end: url(#arrow); }
  </style>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
  </defs>

  <text x="120" y="40" class="section">Agent Layer</text>
  <text x="520" y="40" class="section">Jarvis Control Plane</text>
  <text x="900" y="40" class="section">Execution &amp; Audit</text>

  <rect x="50" y="100" width="140" height="60" class="box"/>
  <text x="120" y="130" class="text">OpenClaw Agent</text>

  <rect x="260" y="100" width="140" height="60" class="box"/>
  <text x="330" y="130" class="text">Proposal</text>

  <rect x="430" y="100" width="140" height="60" class="box"/>
  <text x="500" y="130" class="text">Ingress</text>

  <rect x="600" y="100" width="140" height="60" class="box"/>
  <text x="670" y="130" class="text">Verification</text>

  <rect x="770" y="100" width="140" height="60" class="box"/>
  <text x="840" y="130" class="text">Approval Gate</text>

  <rect x="940" y="100" width="140" height="60" class="box"/>
  <text x="1010" y="130" class="text">Execution</text>

  <rect x="940" y="200" width="140" height="60" class="box"/>
  <text x="1010" y="230" class="text">Receipt Log</text>

  <rect x="770" y="200" width="140" height="60" class="box"/>
  <text x="840" y="230" class="text">Trace Timeline</text>

  <line x1="190" y1="130" x2="260" y2="130" class="arrow"/>
  <line x1="400" y1="130" x2="430" y2="130" class="arrow"/>
  <line x1="570" y1="130" x2="600" y2="130" class="arrow"/>
  <line x1="740" y1="130" x2="770" y2="130" class="arrow"/>
  <line x1="910" y1="130" x2="940" y2="130" class="arrow"/>
  <line x1="1010" y1="160" x2="1010" y2="200" class="arrow"/>
  <line x1="940" y1="230" x2="910" y2="230" class="arrow"/>

  <text x="550" y="300" class="title">Jarvis HUD  AI Control Plane for Verifiable Automation</text>

</svg>
